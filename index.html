<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Faro</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        /* Paleta de colores serena y profesional */
        :root { 
            --primary: #6B9AC4; --primary-hover: #5A87B0; 
            --bg: #F9FBFD; --surface: #FFFFFF; 
            --text: #34495E; --text-light: #95A5A6; 
            --border: #EAEDED; --verse-bg: #F4F8FB; 
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            --btn-bg: #F0F4F8; --btn-hover: #E1E8ED;
        }

        [data-theme="dark"] { 
            --primary: #74A4CF; --primary-hover: #8AB4D9; 
            --bg: #1A2228; --surface: #242D35; 
            --text: #ECF0F1; --text-light: #7F8C8D; 
            --border: #34404B; --verse-bg: #1E272E; 
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            --btn-bg: #2C3842; --btn-hover: #3A4854;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--text); transition: background-color 0.3s, color 0.3s; }
        
        /* Animaciones para transiciones fluidas */
        .fade-transition { transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out; opacity: 1; transform: translateY(0); }
        .fade-hidden { opacity: 0; transform: translateY(10px); pointer-events: none; position: absolute; width: 100%; visibility: hidden; }

        .navbar { background: var(--surface); padding: 15px 20px 10px 20px; display: flex; flex-direction: column; gap: 12px; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; transition: background-color 0.3s; }
        .nav-header { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .navbar h1 { margin: 0; font-size: 22px; color: var(--primary); font-weight: 700; cursor: pointer; letter-spacing: -0.5px; }
        
        #btn-instalar { display: none; background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        #btn-instalar:hover { background: var(--primary-hover); }

        .top-nav-menu { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .top-nav-menu::-webkit-scrollbar { display: none; }
        .nav-item { white-space: nowrap; font-size: 14px; font-weight: 600; color: var(--text-light); cursor: pointer; padding-bottom: 6px; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .nav-item.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .container { max-width: 600px; margin: 0 auto; padding: 20px 15px; position: relative; min-height: 80vh; }
        
        .btn { display: inline-block; width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; box-sizing: border-box; transition: all 0.2s ease; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-outline { background-color: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background-color: var(--btn-bg); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .card { background: var(--surface); border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); transition: background-color 0.3s, border-color 0.3s; }
        
        .profile-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; cursor: pointer; }
        .profile-pic { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: var(--btn-bg); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: var(--primary); border: 2px solid var(--border); overflow: hidden; }
        .user-meta strong { font-size: 15px; display: block; } 
        .user-meta span { font-size: 13px; color: var(--text-light); }
        
        .post-content { margin: 10px 0 16px 0; font-size: 15px; line-height: 1.5; }
        .post-actions { display: flex; gap: 10px; border-top: 1px solid var(--border); padding-top: 12px; flex-wrap: wrap; }
        .action-btn { background: var(--btn-bg); border: none; color: var(--text-light); font-size: 13px; font-weight: 600; cursor: pointer; padding: 8px 16px; border-radius: 20px; transition: all 0.2s; }
        .action-btn:hover { background: var(--btn-hover); color: var(--text); }
        .action-btn.active { color: var(--primary); background: rgba(107, 154, 196, 0.1); }
        
        textarea, input[type="text"], select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); box-sizing: border-box; font-family: inherit; font-size: 14px; margin-bottom: 12px; background-color: var(--bg); color: var(--text); outline: none; transition: border 0.2s, background-color 0.3s; }
        textarea:focus, input[type="text"]:focus { border-color: var(--primary); }
        
        .profile-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .profile-tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; font-weight: 600; color: var(--text-light); cursor: pointer; transition: color 0.2s; }
        .profile-tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .stats-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .stat-item { text-align: center; }
        .stat-item strong { display: block; font-size: 16px; color: var(--text); }
        .stat-item span { font-size: 12px; color: var(--text-light); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(2px); opacity: 0; transition: opacity 0.3s; }
        .modal.show { display: flex; opacity: 1; }
        .modal-content { background: var(--surface); padding: 24px; border-radius: 12px; width: 90%; max-width: 400px; max-height: 85vh; overflow-y: auto; transform: translateY(20px); transition: transform 0.3s; }
        .modal.show .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .modal-header h3 { margin: 0; font-size: 18px; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-light); transition: color 0.2s; }
        .close-btn:hover { color: var(--text); }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-header">
            <h1 onclick="window.location.reload()">Faro</h1>
            <button id="btn-instalar">Instalar App</button>
        </div>
        
        <div class="top-nav-menu fade-transition fade-hidden" id="menu-navegacion">
            <div class="nav-item active" data-tab="global">Inicio</div>
            <div class="nav-item" data-tab="seguidos">Red</div>
            <div class="nav-item" data-tab="oraciones">Oraciones</div>
            <div class="nav-item" data-tab="guardados">Guardados</div>
            <div class="nav-item" data-tab="perfil">Perfil</div>
        </div>
    </div>

    <div class="container">
        
        <div id="seccion-login" class="card fade-transition" style="text-align: center; padding: 40px 20px; margin-top: 20px;">
            <div style="width: 60px; height: 60px; background: var(--primary); border-radius: 16px; margin: 0 auto 15px auto; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; font-weight: bold;">F</div>
            <h2 style="font-weight: 600; margin-bottom: 10px;">Bienvenido a Faro</h2>
            <p style="color: var(--text-light); margin-bottom: 24px; font-size: 14px;">Un espacio sereno para edificar.</p>
            <button class="btn btn-primary" id="btn-google">Ingresar con Google</button>
        </div>

        <div id="seccion-plataforma" class="fade-transition fade-hidden">
            
            <div id="contenedor-creacion-post" class="card">
                <textarea id="input-publicacion" rows="3" placeholder="Escribe un mensaje o petición..."></textarea>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="font-size: 13px; color: var(--text-light); cursor: pointer; display: flex; align-items: center; gap: 5px;">
                        <input type="checkbox" id="chk-peticion"> Es una petición
                    </label>
                    <button class="btn btn-primary" id="btn-publicar" style="width: auto; padding: 8px 20px;">Publicar</button>
                </div>
            </div>

            <div id="bloque-perfil-propio" class="card" style="display:none;">
                <div style="text-align: center;">
                    <div id="mi-perfil-avatar" class="profile-pic" style="width: 80px; height: 80px; margin: 0 auto; font-size: 32px;"></div>
                    <h2 id="mi-perfil-nombre" style="margin: 10px 0 5px 0; font-size: 20px;"></h2>
                    <span id="mi-perfil-tag" style="color: var(--text-light); display: block; margin-bottom: 15px; font-size: 14px;"></span>
                    <p id="mi-perfil-bio" style="color: var(--text); font-size: 14px; margin-bottom: 20px; line-height: 1.5;"></p>
                    
                    <div class="stats-bar">
                        <div class="stat-item"><strong id="stat-seguidores">0</strong><span>Seguidores</span></div>
                        <div class="stat-item"><strong id="stat-seguidos">0</strong><span>Siguiendo</span></div>
                    </div>

                    <div style="display:flex; gap: 10px; justify-content: center; margin-bottom: 20px;">
                        <button id="btn-editar-perfil" class="btn btn-outline" style="width: auto; padding: 8px 20px;">Ajustes</button>
                        <button id="btn-salir" class="btn btn-outline" style="width: auto; padding: 8px 20px;">Salir</button>
                    </div>
                </div>

                <div class="profile-tabs">
                    <div class="profile-tab active" id="subtab-publicaciones">Publicaciones</div>
                    <div class="profile-tab" id="subtab-citas">Citas</div>
                </div>
            </div>
            
            <div id="feed-publicaciones"></div>
        </div>
    </div>

    <div id="modal-ajustes" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Ajustes de Perfil</h3>
                <button class="close-btn" id="cerrar-ajustes">&times;</button>
            </div>
            <label>Nombre a mostrar:</label>
            <input type="text" id="input-nombre" placeholder="Tu nombre">
            <label>Usuario (@):</label>
            <input type="text" id="input-username" placeholder="tu_usuario">
            <label>Biografía:</label>
            <textarea id="input-bio" rows="2" placeholder="Unas palabras sobre ti..."></textarea>
            
            <label>Privacidad de Nombre:</label>
            <select id="select-privacidad">
                <option value="publico">Público (Mostrar mi nombre)</option>
                <option value="anonimo">Anónimo (Solo mostrar @usuario)</option>
            </select>
            
            <label style="display: flex; align-items: center; gap: 10px; margin-top: 15px; cursor: pointer;">
                <input type="checkbox" id="chk-modo-oscuro"> Modo Oscuro
            </label>
            
            <button class="btn btn-primary" id="btn-guardar-perfil" style="margin-top: 20px;">Guardar Cambios</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot, addDoc, updateDoc, doc, setDoc, getDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ⚠️ RECUERDA PEGAR AQUÍ TU CONFIGURACIÓN DE FIREBASE ⚠️
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_DOMINIO",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_STORAGE",
            messagingSenderId: "TU_SENDER",
            appId: "TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let usuarioActualData = null;
        let mapaUsuariosGlobal = {}; 
        let filtroFeedActual = "global";
        let subFiltroPerfil = "publicaciones";

        // --- REGISTRO DE SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registrado', reg.scope))
                    .catch(err => console.error('Error SW:', err));
            });
        }

        // --- PWA INSTALACIÓN ---
        let eventoInstalacion;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            eventoInstalacion = e;
            document.getElementById('btn-instalar').style.display = 'block';
        });

        document.getElementById('btn-instalar').addEventListener('click', async () => {
            if (eventoInstalacion) {
                eventoInstalacion.prompt();
                const { outcome } = await eventoInstalacion.userChoice;
                if (outcome === 'accepted') document.getElementById('btn-instalar').style.display = 'none';
                eventoInstalacion = null;
            }
        });

        // --- FUNCIONES DE TRANSICIÓN Y UI ---
        function transicionSuave(ocultarId, mostrarId) {
            const elOcultar = document.getElementById(ocultarId);
            const elMostrar = document.getElementById(mostrarId);
            
            elOcultar.classList.add('fade-hidden');
            setTimeout(() => {
                elOcultar.style.position = 'absolute';
                elOcultar.style.visibility = 'hidden';
                
                elMostrar.style.position = 'relative';
                elMostrar.style.visibility = 'visible';
                elMostrar.classList.remove('fade-hidden');
            }, 400); // Espera a que termine la animación CSS
        }

        function obtenerInicial(nombre) {
            return nombre ? nombre.charAt(0).toUpperCase() : '?';
        }

        // --- SESIÓN ---
        document.getElementById('btn-google').addEventListener('click', () => {
            signInWithPopup(auth, new GoogleAuthProvider()).catch(err => alert("Error de inicio de sesión: " + err.message));
        });
        
        document.getElementById('btn-salir').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await verificarPerfil(user);
                document.getElementById('menu-navegacion').classList.remove('fade-hidden');
                transicionSuave('seccion-login', 'seccion-plataforma');
            } else {
                document.getElementById('menu-navegacion').classList.add('fade-hidden');
                transicionSuave('seccion-plataforma', 'seccion-login');
            }
            escucharFeed();
        });

        async function verificarPerfil(user) {
            const userRef = doc(db, "usuarios", user.uid);
            let snap = await getDoc(userRef);
            if (!snap.exists()) {
                await setDoc(userRef, {
                    nombre: user.displayName || "Usuario",
                    username: user.email.split('@')[0].toLowerCase() + Math.floor(Math.random()*100),
                    bio: "Uniendo propósitos.",
                    seguidos: [], seguidores: [], guardados: [], privacidadNombre: "publico", modoOscuro: false
                });
                snap = await getDoc(userRef);
            }
            usuarioActualData = { id: user.uid, ...snap.data() };
            if(usuarioActualData.modoOscuro) document.documentElement.setAttribute('data-theme', 'dark');
            actualizarVistaPerfil();
        }

        function actualizarVistaPerfil() {
            document.getElementById('mi-perfil-nombre').textContent = usuarioActualData.nombre;
            document.getElementById('mi-perfil-tag').textContent = `@${usuarioActualData.username}`;
            document.getElementById('mi-perfil-bio').textContent = usuarioActualData.bio;
            
            // Renderizar Avatar Propio
            const avatarDiv = document.getElementById('mi-perfil-avatar');
            avatarDiv.textContent = obtenerInicial(usuarioActualData.nombre);
            avatarDiv.style.background = "var(--primary)";
            avatarDiv.style.color = "white";
        }

        // --- CREAR PUBLICACIÓN ---
        document.getElementById('btn-publicar').addEventListener('click', async () => {
            const contenido = document.getElementById('input-publicacion').value;
            const esPeticion = document.getElementById('chk-peticion').checked;
            const btn = document.getElementById('btn-publicar');

            if (!contenido.trim()) return;

            btn.disabled = true;
            btn.textContent = "Enviando...";

            try {
                await addDoc(collection(db, "publicaciones"), {
                    userId: auth.currentUser.uid,
                    content: contenido,
                    isPrayer: esPeticion,
                    likes: [],
                    timestamp: serverTimestamp(),
                    status: "approved"
                });
                document.getElementById('input-publicacion').value = "";
                document.getElementById('chk-peticion').checked = false;
            } catch (error) {
                alert("Error al publicar: " + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "Publicar";
            }
        });

        // --- LÓGICA DE MODAL AJUSTES ---
        const modalAjustes = document.getElementById('modal-ajustes');
        
        document.getElementById('btn-editar-perfil').addEventListener('click', () => {
            document.getElementById('input-nombre').value = usuarioActualData.nombre;
            document.getElementById('input-username').value = usuarioActualData.username;
            document.getElementById('input-bio').value = usuarioActualData.bio;
            document.getElementById('select-privacidad').value = usuarioActualData.privacidadNombre || "publico";
            document.getElementById('chk-modo-oscuro').checked = usuarioActualData.modoOscuro || false;
            modalAjustes.classList.add('show');
        });

        document.getElementById('cerrar-ajustes').addEventListener('click', () => modalAjustes.classList.remove('show'));

        document.getElementById('btn-guardar-perfil').addEventListener('click', async () => {
            const btn = document.getElementById('btn-guardar-perfil');
            btn.disabled = true;
            btn.textContent = "Guardando...";

            const nuevosDatos = {
                nombre: document.getElementById('input-nombre').value,
                username: document.getElementById('input-username').value,
                bio: document.getElementById('input-bio').value,
                privacidadNombre: document.getElementById('select-privacidad').value,
                modoOscuro: document.getElementById('chk-modo-oscuro').checked
            };
            
            await updateDoc(doc(db, "usuarios", auth.currentUser.uid), nuevosDatos);
            usuarioActualData = { ...usuarioActualData, ...nuevosDatos };
            
            if(nuevosDatos.modoOscuro) document.documentElement.setAttribute('data-theme', 'dark');
            else document.documentElement.removeAttribute('data-theme');
            
            actualizarVistaPerfil();
            modalAjustes.classList.remove('show');
            btn.disabled = false;
            btn.textContent = "Guardar Cambios";
            escucharFeed(); // Refrescar nombres en el feed
        });

        // --- NAVEGACIÓN ---
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                e.target.classList.add('active');
                filtroFeedActual = e.target.getAttribute('data-tab');
                
                if (filtroFeedActual === "perfil") {
                    document.getElementById('contenedor-creacion-post').style.display = "none";
                    document.getElementById('bloque-perfil-propio').style.display = "block";
                } else {
                    document.getElementById('contenedor-creacion-post').style.display = "block";
                    document.getElementById('bloque-perfil-propio').style.display = "none";
                }
                escucharFeed();
            });
        });

        // --- MOTOR DE FEED RESTAURADO ---
        let desubscribirFeed = null;
        function escucharFeed() {
            if (desubscribirFeed) desubscribirFeed();
            
            // Usando query con ordenamiento (requiere índice en Firebase, si falla el orden quita orderBy)
            const q = query(collection(db, "publicaciones")); 
            
            desubscribirFeed = onSnapshot(q, async (snap) => {
                const feedContainer = document.getElementById('feed-publicaciones');
                feedContainer.innerHTML = '';
                
                const usuariosSnaps = await getDocs(collection(db, "usuarios"));
                usuariosSnaps.forEach(d => { mapaUsuariosGlobal[d.id] = d.data(); });

                let lista = snap.docs.map(d => {
                    const data = d.data();
                    const autorInfo = mapaUsuariosGlobal[data.userId] || {};
                    const esPropio = data.userId === auth.currentUser?.uid;
                    const nombreMostrar = (autorInfo.privacidadNombre === "anonimo" && !esPropio) ? `@${autorInfo.username}` : (autorInfo.nombre || "Usuario");
                    return { id: d.id, ...data, autorNombreFeed: nombreMostrar, autorUsername: autorInfo.username };
                });

                // Ordenar localmente por si Firebase no tiene el índice creado aún
                lista.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

                lista.forEach(post => {
                    const inicialAvatar = obtenerInicial(post.autorNombreFeed);
                    const colorAvatar = post.autorNombreFeed.startsWith('@') ? 'var(--text-light)' : 'var(--primary)';
                    
                    const div = document.createElement('div');
                    div.className = 'card fade-transition';
                    div.innerHTML = `
                        <div class="profile-header">
                            <div class="profile-pic" style="background: ${colorAvatar}; color: white; border: none;">${inicialAvatar}</div>
                            <div class="user-meta"><strong>${post.autorNombreFeed}</strong><span>@${post.autorUsername}</span></div>
                        </div>
                        <div class="post-content">${post.content}</div>
                        <div class="post-actions">
                            <button class="action-btn">${post.isPrayer ? 'Orando' : 'Me gusta'} ${(post.likes || []).length}</button>
                            <button class="action-btn">Citar</button>
                        </div>
                    `;
                    feedContainer.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
