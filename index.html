<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faro</title>
    <!-- Tu CSS original permanece igual, no necesita cambios -->
    <style>
        :root { --primary: #5A9BD5; --primary-hover: #4A84B5; --bg: #F0F4F8; --surface: #FFFFFF; --text: #2C3E50; --text-light: #7F8C8D; --border: #E1E8ED; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--text); }
        .header { background: var(--surface); padding: 20px; text-align: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .header h1 { margin: 0; font-size: 26px; color: var(--primary); letter-spacing: 1px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .btn { display: inline-block; width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; text-align: center; box-sizing: border-box; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-outline { background-color: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .card { background: var(--surface); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border); }
        .profile-pic { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 200; }
        .modal-content { background: var(--surface); padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; }
        .quote-box { background: var(--bg); padding: 12px; border-left: 4px solid var(--primary); margin: 10px 0; font-size: 14px; }
        .avatar-option { width: 50px; height: 50px; cursor: pointer; border: 3px solid transparent; }
        .avatar-option.selected { border-color: var(--primary); }
    </style>
</head>
<body>

    <div class="header"><h1>Faro</h1></div>

    <div class="container">
        <!-- Login -->
        <div id="seccion-login" class="card" style="text-align: center;">
            <h2>Bienvenido a Faro</h2>
            <button class="btn btn-primary" id="btn-google">Ingresar con Google</button>
        </div>

        <!-- Perfil -->
        <div id="seccion-perfil" style="display: none;">
            <div class="card profile-header" style="display:flex; align-items:center; gap:15px;">
                <img id="img-perfil" src="" class="profile-pic">
                <div>
                    <strong id="nombre-usuario"></strong>
                    <p id="bio-usuario"></p>
                </div>
                <button id="btn-editar-perfil" class="action-btn">⚙️</button>
                <button id="btn-salir" class="action-btn" style="color:red;">Salir</button>
            </div>

            <div class="card">
                <textarea id="input-publicacion" rows="3" placeholder="¿Qué mensaje quieres compartir?"></textarea>
                <button class="btn btn-primary" id="btn-publicar">Compartir Mensaje</button>
            </div>
        </div>

        <div id="feed-publicaciones"></div>
    </div>

    <!-- Modal Perfil -->
    <div id="modal-perfil" class="modal">
        <div class="modal-content">
            <h3>Editar Perfil</h3>
            <textarea id="input-bio" placeholder="Biografía..."></textarea>
            <button id="btn-guardar-perfil" class="btn btn-primary">Guardar</button>
            <button id="btn-cerrar-perfil" class="btn btn-outline">Cancelar</button>
        </div>
    </div>

    <!-- Modal Repost -->
    <div id="modal-repost" class="modal">
        <div class="modal-content">
            <h3>Citar mensaje</h3>
            <div id="repost-preview" class="quote-box"></div>
            <textarea id="input-repost-comentario" placeholder="Tu comentario..."></textarea>
            <input type="hidden" id="repost-id-original">
            <button id="btn-confirmar-repost" class="btn btn-primary">Publicar</button>
            <button id="btn-cerrar-repost" class="btn btn-outline">Cancelar</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
