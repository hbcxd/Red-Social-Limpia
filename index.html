<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faro - Red Social de Dios</title>
    <style>
        /* =========================================
           1. VARIABLES Y TEMA BASE
           ========================================= */
        :root {
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --primary: #6B9AC4;
            --primary-light: rgba(107, 154, 196, 0.12);
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #121824;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-light: #94a3b8;
            --border: #334155;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        /* =========================================
           2. SISTEMA DE PANTALLAS (LOGIN VS APP)
           ========================================= */
        .pantalla {
            display: none; /* Oculto por defecto */
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .pantalla.activa {
            display: block;
            opacity: 1;
        }

        /* Diseño específico del Login */
        #pantalla-login {
            display: flex; /* Flexbox para centrar todo */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            text-align: center;
        }

        .titulo-app { font-size: 2.5rem; margin-bottom: 10px; }
        .subtitulo-app { color: var(--text-light); margin-bottom: 30px; }

        .btn-google {
            background: #fff;
            color: #444;
            border: 1px solid var(--border);
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.2s;
        }
        .btn-google:active { transform: scale(0.98); }

        /* =========================================
           3. COMPONENTES DE LA APLICACIÓN
           ========================================= */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        /* Botones e Inputs */
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .textarea-input {
            width: 100%;
            height: 80px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            background: var(--card-bg);
            color: var(--text);
            box-sizing: border-box;
            resize: none;
            margin-bottom: 10px;
        }

        /* Navegación Inferior */
        nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1000;
        }
        .nav-item {
            background: none; border: none; color: var(--text-light);
            font-weight: 600; cursor: pointer; padding: 8px 16px; border-radius: 20px;
        }
        .nav-item.active { color: var(--primary); background: var(--primary-light); }
        .spacer { height: 80px; } /* Evita que el menú tape el contenido */

    </style>
</head>
<body>

    <!-- ==============================================================
         CONTENEDOR 1: AUTENTICACIÓN (Prioridad Absoluta)
         ============================================================== -->
    <div id="pantalla-login" class="pantalla activa">
        <h1 class="titulo-app">⛵ Faro</h1>
        <p class="subtitulo-app">Conéctate con la comunidad de fe y comparte la palabra.</p>
        
        <button id="btn-google" class="btn-google">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_24dp.png" alt="Google" width="20">
            Continuar con Google
        </button>
    </div>

    <!-- ==============================================================
         CONTENEDOR 2: APLICACIÓN PRINCIPAL (Carga tras el Login)
         ============================================================== -->
    <div id="pantalla-app" class="pantalla container">
        
        <!-- Bloque Versículo -->
        <div class="card" style="border-left: 4px solid var(--primary); background: var(--primary-light); text-align: center;">
            <div id="texto-versiculo" style="font-style: italic; font-size: 18px; margin-bottom: 8px;">Cargando palabra del día...</div>
            <div id="ref-versiculo" style="color: var(--text-light); font-size: 14px;"></div>
        </div>

        <!-- Creador de Publicaciones -->
        <div class="card" id="contenedor-publicar">
            <textarea id="input-publicacion" class="textarea-input" placeholder="Comparte una reflexión o petición..."></textarea>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label style="font-size: 14px; cursor: pointer;">
                    <input type="checkbox" id="chk-peticion"> 🙏 Es petición
                </label>
                <button id="btn-publicar" class="btn-primary">Publicar</button>
            </div>
        </div>

        <!-- Feed de Contenido -->
        <div id="feed-publicaciones"></div>
        <div class="spacer"></div>
    </div>

    <!-- Navegación (Solo visible en la app) -->
    <nav id="menu-navegacion" style="display: none;">
        <button class="nav-item active" data-tab="global">🌍 Global</button>
        <button class="nav-item" data-tab="oraciones">🙏 Oraciones</button>
        <button class="nav-item" id="btn-salir">Cerrar Sesión</button>
    </nav>


    <!-- ==============================================================
         LÓGICA JAVASCRIPT Y FIREBASE
         ============================================================== -->
    <script type="module">
        // 1. Importaciones de Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        
        // Importación de Cloud Messaging
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

        // 2. Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAzb71Y1IHcGhWqRmX5E3-Va5258wrhdk0",
            authDomain: "red-social-de-dios.firebaseapp.com",
            projectId: "red-social-de-dios",
            storageBucket: "red-social-de-dios.firebasestorage.app",
            messagingSenderId: "256126083920",
            appId: "1:256126083920:web:f9265cbac956d1efe38255",
            measurementId: "G-5X7TMJVN71"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const messaging = getMessaging(app);

        // Clave VAPID proporcionada para notificaciones
        const VAPID_KEY = "BMXEapO152zU5C2NCR9joZWClL0SK2mDUro7Hev8qtkJdvRB0Z8HwcrK_HvkIYED_Q1NKMjVuBd0r3zKLYwEMLY";

        // 3. Gestión de Interfaz (Cambio de pantallas)
        const pantallaLogin = document.getElementById('pantalla-login');
        const pantallaApp = document.getElementById('pantalla-app');
        const menuNavegacion = document.getElementById('menu-navegacion');

        function mostrarApp() {
            pantallaLogin.classList.remove('activa');
            pantallaLogin.style.display = 'none'; // Quitamos el login del flujo
            
            pantallaApp.classList.add('activa');
            menuNavegacion.style.display = 'flex';
        }

        function mostrarLogin() {
            pantallaApp.classList.remove('activa');
            menuNavegacion.style.display = 'none';
            
            pantallaLogin.style.display = 'flex';
            setTimeout(() => pantallaLogin.classList.add('activa'), 50);
        }

        // 4. Lógica de Autenticación
        document.getElementById('btn-google').addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                // Redirección segura priorizada
                await signInWithRedirect(auth, provider);
            } catch (error) {
                console.error("Error al iniciar sesión:", error);
            }
        });

        document.getElementById('btn-salir').addEventListener('click', () => signOut(auth));

        // El Observador de Sesión: Decide qué pantalla mostrar
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // El usuario está validado, mostramos la App
                mostrarApp();
                configurarNotificaciones();
                cargarFeed();
            } else {
                // No hay usuario, mostramos el Login obligatoriamente
                mostrarLogin();
            }
        });

        // 5. Configuración de Cloud Messaging
        async function configurarNotificaciones() {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    const token = await getToken(messaging, { vapidKey: VAPID_KEY });
                    if (token) {
                        console.log("Token de FCM listo para recibir mensajes:", token);
                        // Aquí en el futuro puedes guardar el token en la base de datos del usuario
                    }
                }
            } catch (error) {
                console.log("Permiso de notificaciones denegado o error:", error);
            }
        }

        // 6. Lógica Básica de Publicación
        document.getElementById('btn-publicar').addEventListener('click', async () => {
            const contenido = document.getElementById('input-publicacion').value;
            const esPeticion = document.getElementById('chk-peticion').checked;
            
            if (!contenido.trim()) return;

            try {
                await addDoc(collection(db, "publicaciones"), {
                    userId: auth.currentUser.uid,
                    nombre: auth.currentUser.displayName || "Usuario",
                    content: contenido,
                    isPrayer: esPeticion,
                    timestamp: serverTimestamp()
                });
                document.getElementById('input-publicacion').value = "";
                document.getElementById('chk-peticion').checked = false;
            } catch (error) {
                console.error("Error publicando:", error);
            }
        });

        // 7. Lógica Básica del Feed
        function cargarFeed() {
            onSnapshot(query(collection(db, "publicaciones")), (snap) => {
                const contenedor = document.getElementById('feed-publicaciones');
                contenedor.innerHTML = '';
                
                let posts = snap.docs.map(doc => doc.data());
                // Ordenar por más reciente (verificando que exista el timestamp)
                posts.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

                posts.forEach(post => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <strong style="color: var(--primary);">${post.nombre}</strong>
                        <p style="margin: 8px 0; line-height: 1.5;">${post.content}</p>
                        <span style="font-size: 12px; color: var(--text-light);">
                            ${post.isPrayer ? '🙏 Petición de oración' : '💬 Publicación'}
                        </span>
                    `;
                    contenedor.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
