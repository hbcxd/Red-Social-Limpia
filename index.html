<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Faro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Paleta de colores serena y profesional */
        :root { 
            --primary: #6B9AC4; --primary-hover: #5A87B0; 
            --bg: #F9FBFD; --surface: #FFFFFF; 
            --text: #34495E; --text-light: #95A5A6; 
            --border: #EAEDED; --verse-bg: #F4F8FB; 
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            --btn-bg: #F0F4F8; --btn-hover: #E1E8ED;
        }

        [data-theme="dark"] { 
            --primary: #74A4CF; --primary-hover: #8AB4D9; 
            --bg: #1A2228; --surface: #242D35; 
            --text: #ECF0F1; --text-light: #7F8C8D; 
            --border: #34404B; --verse-bg: #1E272E; 
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            --btn-bg: #2C3842; --btn-hover: #3A4854;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--text); transition: background-color 0.3s, color 0.3s; }
        
        /* Barra de Navegación Principal */
        .navbar { background: var(--surface); padding: 15px 20px 10px 20px; display: flex; flex-direction: column; gap: 12px; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .nav-header { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .navbar h1 { margin: 0; font-size: 22px; color: var(--primary); font-weight: 700; cursor: pointer; letter-spacing: -0.5px; }
        
        /* Botón Instalar Profesional */
        #btn-instalar { display: none; background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; }

        /* Menú de pestañas superior */
        .top-nav-menu { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .top-nav-menu::-webkit-scrollbar { display: none; }
        .nav-item { white-space: nowrap; font-size: 14px; font-weight: 600; color: var(--text-light); cursor: pointer; padding-bottom: 6px; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .nav-item.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .container { max-width: 600px; margin: 0 auto; padding: 20px 15px; }
        
        /* Botones suaves */
        .btn { display: inline-block; width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; box-sizing: border-box; transition: all 0.2s ease; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-outline { background-color: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background-color: var(--btn-bg); }
        
        .daily-verse { background: var(--verse-bg); border-left: 3px solid var(--primary); padding: 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; line-height: 1.5; color: var(--text); }
        
        .card { background: var(--surface); border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        
        /* Perfil y vistas */
        .profile-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; cursor: pointer; }
        .profile-pic { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: var(--btn-bg); }
        .user-meta strong { font-size: 15px; display: block; } 
        .user-meta span { font-size: 13px; color: var(--text-light); }
        
        /* Interacciones de publicación */
        .post-content { margin: 10px 0 16px 0; font-size: 15px; line-height: 1.5; }
        .post-actions { display: flex; gap: 10px; border-top: 1px solid var(--border); padding-top: 12px; flex-wrap: wrap; }
        .action-btn { background: var(--btn-bg); border: none; color: var(--text-light); font-size: 13px; font-weight: 600; cursor: pointer; padding: 8px 16px; border-radius: 20px; transition: all 0.2s; }
        .action-btn:hover { background: var(--btn-hover); color: var(--text); }
        .action-btn.active { color: var(--primary); background: rgba(107, 154, 196, 0.1); }
        
        .quote-box { background: var(--verse-bg); padding: 12px 16px; border-radius: 8px; margin: 12px 0; font-size: 14px; color: var(--text); border: 1px solid var(--border); }
        
        /* Entradas de texto */
        textarea, input[type="text"], select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); box-sizing: border-box; font-family: inherit; font-size: 14px; margin-bottom: 12px; background-color: var(--bg); color: var(--text); outline: none; transition: border 0.2s; }
        textarea:focus, input[type="text"]:focus { border-color: var(--primary); }
        
        /* Sub-pestañas del perfil */
        .profile-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .profile-tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; font-weight: 600; color: var(--text-light); cursor: pointer; }
        .profile-tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .stats-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .stat-item { text-align: center; }
        .stat-item strong { display: block; font-size: 16px; color: var(--text); }
        .stat-item span { font-size: 12px; color: var(--text-light); }

        /* Modales */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(2px); }
        .modal-content { background: var(--surface); padding: 24px; border-radius: 12px; width: 90%; max-width: 400px; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-header">
            <h1 onclick="window.location.reload()">Faro</h1>
            <button id="btn-instalar">Instalar App</button>
        </div>
        
        <!-- Nueva Navegación Superior -->
        <div class="top-nav-menu" id="menu-navegacion" style="display: none;">
            <div class="nav-item active" data-tab="global">Inicio</div>
            <div class="nav-item" data-tab="seguidos">Red</div>
            <div class="nav-item" data-tab="oraciones">Oraciones</div>
            <div class="nav-item" data-tab="guardados">Guardados</div>
            <div class="nav-item" data-tab="perfil">Perfil</div>
        </div>
    </div>

    <div class="container">
        <div id="seccion-versiculo" class="daily-verse" style="display:none;">
            <span id="texto-versiculo">Cargando alimento diario...</span>
        </div>

        <div id="seccion-login" class="card" style="text-align: center; padding: 40px 20px;">
            <h2 style="font-weight: 600; margin-bottom: 10px;">Bienvenido a Faro</h2>
            <p style="color: var(--text-light); margin-bottom: 24px; font-size: 14px;">Un espacio sereno para edificar.</p>
            <button class="btn btn-primary" id="btn-google">Ingresar con Google</button>
        </div>

        <div id="seccion-plataforma" style="display: none;">
            
            <div id="contenedor-creacion-post" class="card">
                <textarea id="input-publicacion" rows="3" placeholder="Escribe un mensaje o petición..."></textarea>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="font-size: 13px; color: var(--text-light); cursor: pointer;">
                        <input type="checkbox" id="chk-peticion" style="margin-right: 5px;"> Es una petición
                    </label>
                    <button class="btn btn-primary" id="btn-publicar" style="width: auto; padding: 8px 20px;">Publicar</button>
                </div>
            </div>

            <!-- Perfil Rediseñado -->
            <div id="bloque-perfil-propio" class="card" style="display:none;">
                <div style="text-align: center;">
                    <img id="mi-perfil-foto" src="" class="profile-pic" style="width: 80px; height: 80px; margin: 0 auto; display: block;">
                    <h2 id="mi-perfil-nombre" style="margin: 10px 0 5px 0; font-size: 20px;"></h2>
                    <span id="mi-perfil-tag" style="color: var(--text-light); display: block; margin-bottom: 15px; font-size: 14px;"></span>
                    <p id="mi-perfil-bio" style="color: var(--text); font-size: 14px; margin-bottom: 20px; line-height: 1.5;"></p>
                    
                    <div class="stats-bar">
                        <div class="stat-item"><strong id="stat-seguidores">0</strong><span>Seguidores</span></div>
                        <div class="stat-item"><strong id="stat-seguidos">0</strong><span>Siguiendo</span></div>
                    </div>

                    <div style="display:flex; gap: 10px; justify-content: center; margin-bottom: 20px;">
                        <button id="btn-editar-perfil" class="btn btn-outline" style="width: auto; padding: 8px 20px;">Ajustes</button>
                        <button id="btn-salir" class="btn btn-outline" style="width: auto; padding: 8px 20px;">Salir</button>
                    </div>
                </div>

                <!-- Sub-pestañas de Perfil -->
                <div class="profile-tabs">
                    <div class="profile-tab active" id="subtab-publicaciones">Publicaciones</div>
                    <div class="profile-tab" id="subtab-citas">Citas</div>
                </div>
            </div>
        </div>

        <div id="feed-publicaciones"></div>
    </div>

    <!-- Modal Ajustes (Omití el HTML de los modales para mantener el mensaje corto, pero puedes mantener los mismos modales del paso anterior, solo quítale los emojis a los textos como "Cancelar", "Guardar") -->

    <script type="module" src="app.js"></script>
</body>
</html>
